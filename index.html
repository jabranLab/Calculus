<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculus - Advanced Calculator</title>
    <style>
        body {
            background-color: #12161a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator {
            background-color: #1a1f26;
            border: 2px solid #00d2ff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            width: 320px;
        }
        .display {
            width: 100%;
            height: 60px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #00d2ff;
            font-size: 24px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: #21262d;
            color: #ffffff;
            transition: all 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        button.operator {
            color: #00d2ff;
            font-weight: bold;
        }
        button.scientific {
            background-color: #282e38;
            color: #ff9f43;
            font-size: 14px;
        }
        button.clear {
            background-color: #ea4335;
            color: white;
        }
        button.equal {
            background-color: #00d2ff;
            color: #12161a;
            font-weight: bold;
            grid-column: span 2;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div style="text-align:center; color:#00d2ff; margin-bottom:10px; font-weight:bold; letter-spacing: 2px;">CALCULUS</div>
    <input type="text" class="display" id="screen" readonly placeholder="0">
    
    <div class="buttons">
        <button class="clear" onclick="clearScreen()">C</button>
        <button class="scientific" onclick="pushBtn('Math.sin(')">sin</button>
        <button class="scientific" onclick="pushBtn('Math.cos(')">cos</button>
        <button class="scientific" onclick="pushBtn('Math.tan(')">tan</button>
        
        <button class="scientific" onclick="pushBtn('Math.sqrt(')">√</button>
        <button class="scientific" onclick="pushBtn('Math.pow(')">xʸ</button>
        <button class="scientific" onclick="pushBtn('Math.log10(')">log</button>
        <button class="operator" onclick="pushBtn('/')">÷</button>
        
        <button onclick="pushBtn('7')">7</button>
        <button onclick="pushBtn('8')">8</button>
        <button onclick="pushBtn('9')">9</button>
        <button class="operator" onclick="pushBtn('*')">×</button>
        
        <button onclick="pushBtn('4')">4</button>
        <button onclick="pushBtn('5')">5</button>
        <button onclick="pushBtn('6')">6</button>
        <button class="operator" onclick="pushBtn('-')">-</button>
        
        <button onclick="pushBtn('1')">1</button>
        <button onclick="pushBtn('2')">2</button>
        <button onclick="pushBtn('3')">3</button>
        <button class="operator" onclick="pushBtn('+')">+</button>
        
        <button onclick="pushBtn('0')">0</button>
        <button onclick="pushBtn('.')">.</button>
        <button class="scientific" onclick="pushBtn(')')">)</button>
        <button onclick="pushBtn('(')">(</button>
        
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');

    function pushBtn(val) {
        if (screen.value === '0' && val !== '.') {
            screen.value = val;
        } else {
            screen.value += val;
        }
    }

    function clearScreen() {
        screen.value = '';
    }

    function calculate() {
        try {
            let expression = screen.value;
            // إصلاح الأقواس المفتوحة تلقائياً لمنع الأخطاء
            let openBrackets = (expression.match(/\(/g) || []).length;
            let closeBrackets = (expression.match(/\)/g) || []).length;
            while (openBrackets > closeBrackets) {
                expression += ')';
                closeBrackets++;
            }
            
            let result = eval(expression);
            if (result !== undefined) {
                screen.value = Number(result.toFixed(6)); // تقريب النتيجة لـ 6 أرقام
            }
        } catch (error) {
            screen.value = 'Error';
        }
    }
</script>

</body>
</html>
